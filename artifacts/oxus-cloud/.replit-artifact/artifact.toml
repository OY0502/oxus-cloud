kind = "web"
previewPath = "/"
title = "OXUS Cloud"
version = "1.0.0"
id = "artifacts/oxus-cloud"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18556

[services.development]
run = "pnpm --filter @workspace/oxus-cloud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oxus-cloud", "run", "build" ]
publicDir = "artifacts/oxus-cloud/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18556"
BASE_PATH = "/"
